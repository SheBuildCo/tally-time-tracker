appId: com.shebuildco.tally
productName: Tally
copyright: © SheBuildCo

directories:
  output: dist
  buildResources: build

# What goes inside the app bundle: the static UI export, the bundled main/preload,
# and package.json (electron-builder reads "main" from it).
files:
  - out/**/*
  - dist-electron/**/*
  - package.json

# better-sqlite3 is a native module — keep its binary outside the asar archive so
# it can be loaded at runtime. electron-builder rebuilds it for Electron's ABI.
asarUnpack:
  - node_modules/better-sqlite3/**

win:
  target:
    - nsis
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tally

# Builds for macOS/Linux are possible later; Windows (nsis) is the team target.
mac:
  target: dmg
linux:
  target: AppImage
